<!DOCTYPE html>
<html>

<head>

<title>Add Product</title>

<style>

body{

font-family:Arial;

background:#f4f4f4;

padding:40px;

}

.container{

width:450px;

margin:auto;

background:white;

padding:30px;

border-radius:10px;

box-shadow:0 0 10px #ccc;

}

input{

width:100%;

padding:12px;

margin:10px 0;

}

button{

padding:12px;

width:100%;

background:#0d6efd;

color:white;

border:none;

cursor:pointer;

}

a{

text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<h2>Add Product</h2>

<form method="POST">

<input
type="text"
name="name"
placeholder="Product Name"
required>

<input
type="text"
name="category"
placeholder="Category"
required>

<input
type="number"
step="0.01"
name="price"
placeholder="Price"
required>

<input
type="number"
name="stock"
placeholder="Stock"
required>

<button>

Save Product

</button>

</form>

<br>

<a href="/products">

Back

</a>

</div>

</body>

</html>
