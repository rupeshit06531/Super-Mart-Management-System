<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            width:450px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px #ccc;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Edit Product</h2>

<form method="POST">

<input
type="text"
name="name"
value="{{ product.name }}"
required>

<input
type="text"
name="category"
value="{{ product.category }}"
required>

<input
type="number"
step="0.01"
name="price"
value="{{ product.price }}"
required>

<input
type="number"
name="stock"
value="{{ product.stock }}"
required>

<button>

Update Product

</button>

</form>

</div>

</body>

</html>
