<!DOCTYPE html>
<html>
<head>
    <title>Products</title>

    <style>
        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:30px;
        }

        h1{
            color:#333;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:12px;
            text-align:center;
        }

        th{
            background:#0d6efd;
            color:white;
        }

        a{
            text-decoration:none;
            color:white;
            background:#0d6efd;
            padding:10px 15px;
            border-radius:5px;
        }
    </style>

</head>

<body>

<h1>Product List</h1>

<br>

<a href="/products/add">

Add Product

</a>

<br><br>



<br>

<a href="/dashboard">Dashboard</a>

<br><br>

<table>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Category</th>
    <th>Price</th>
    <th>Stock</th>
    <th>Action</th>
</tr>

{% for product in products %}

<tr>

<td>{{ product.id }}</td>
<td>{{ product.name }}</td>
<td>{{ product.category }}</td>
<td>{{ product.price }}</td>
<td>{{ product.stock }}</td>

<td>

<a href="/products/edit/{{ product.id }}">

Edit

</a>

|

<a href="/products/delete/{{ product.id }}"
   onclick="return confirm('Are you sure you want to delete this product?')">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
