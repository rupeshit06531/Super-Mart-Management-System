<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Mart Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
display:flex;
background:#f4f6f9;
}

/* Sidebar */

.sidebar{
width:240px;
height:100vh;
background:#1f2937;
color:white;
position:fixed;
}

.sidebar h2{
text-align:center;
padding:20px;
background:#111827;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:18px;
border-bottom:1px solid #374151;
cursor:pointer;
}

.sidebar ul li:hover{
background:#2563eb;
}

/* Main */

.main{
margin-left:240px;
width:100%;
}

.header{
background:#2563eb;
color:white;
padding:20px;
font-size:25px;
font-weight:bold;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:30px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
text-align:center;
}

.card h3{
margin-bottom:10px;
}

.card p{
font-size:35px;
color:#2563eb;
font-weight:bold;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>SMMS</h2>

<ul>

<li>🏠 Dashboard</li>

<li><a href="/products" style="color:white;text-decoration:none;">📦 Products</a></li>

<li>📂 Categories</li>

<li>🛒 Sales</li>

<li>👥 Customers</li>

<li>🧾 Billing</li>

<li>📈 Reports</li>

<li>👤 Users</li>

<li>⚙ Settings</li>

<li>🚪 Logout</li>

</ul>

</div>

<div class="main">

<div class="header">

Welcome Admin

</div>

<div class="cards">

<div class="card">
<h3>Total Products</h3>
<p>0</p>
</div>

<div class="card">
<h3>Total Categories</h3>
<p>0</p>
</div>

<div class="card">
<h3>Total Customers</h3>
<p>0</p>
</div>

<div class="card">
<h3>Total Sales</h3>
<p>0</p>
</div>

</div>

</div>

</body>
</html>
