<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Define the character encoding -->
    <meta charset="UTF-8">

    <!-- Make the page responsive on all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Display the page title in the browser -->
    <title>Admin Login | Super Mart Management System</title>

</head>

<body>

    <!-- Display the application title -->
    <h1>Super Mart Management System</h1>

    <!-- Display the login form -->
    <form method="POST">

        <!-- Allow the administrator to enter a username -->
        <label>Username</label><br>
        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required
        >

        <br><br>

        <!-- Allow the administrator to enter a password -->
        <label>Password</label><br>
        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <br><br>

        <!-- Submit the login form -->
        <button type="submit">
            Login
        </button>

    </form>

</body>

</html>
